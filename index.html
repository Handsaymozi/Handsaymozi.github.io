<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我们的异地恋小星球 🪐</title>
    <style>
        :root {
            --primary: #ff85a2;
            --accent: #6b5b95;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at top, #fff5f7, #e6e9f0);
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
            color: #444;
            overflow-x: hidden;
        }

        /* 密码锁 */
        #lock {
            position: fixed; inset: 0; background: var(--glass);
            backdrop-filter: blur(20px); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .lock-card { background: white; padding: 40px; border-radius: 30px; box-shadow: var(--shadow); text-align: center; width: 85%; max-width: 350px; }
        .in { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 15px; text-align: center; font-size: 18px; outline: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }

        /* 主界面 */
        #app { max-width: 900px; margin: 0 auto; padding: 20px; display: none; }
        .header { text-align: center; margin: 20px 0 30px; }
        .title { font-size: 1.8rem; background: linear-gradient(45deg, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 倒计时卡片 */
        .card-cd {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 25px; text-align: center;
            border: 1px solid white; box-shadow: var(--shadow); margin-bottom: 30px;
        }
        .time { font-size: 1.6rem; font-weight: 800; color: var(--accent); margin-top: 10px; }

        /* 选项卡 */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .t-btn { padding: 12px 30px; border-radius: 50px; border: none; background: white; color: var(--accent); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .t-btn.active { background: var(--accent); color: white; }

        /* 内容容器 */
        .box { display: none; animation: fadeIn 0.6s ease; }
        .box.active { display: block; }

        /* 小说板块布局 */
        .novel-wrap { display: flex; gap: 20px; height: 65vh; position: relative; }
        
        .side {
            width: 250px; background: rgba(255,255,255,0.5); border-radius: 20px;
            padding: 15px; overflow-y: auto; border: 1px solid white;
        }
        
        .reader {
            flex: 1; background: white; border-radius: 20px;
            padding: 30px; overflow-y: auto; box-shadow: var(--shadow);
            position: relative;
        }

        .ch-card {
            padding: 15px; margin-bottom: 10px; border-radius: 12px;
            cursor: pointer; background: white; font-size: 0.9rem; transition: 0.2s;
        }
        .ch-card.active { background: var(--primary); color: white; transform: translateX(5px); }

        /* 日记板块 */
        .diary-card {
            background: white; padding: 25px; border-radius: 20px;
            margin-bottom: 20px; box-shadow: var(--shadow);
        }

        /* 手机端浮动菜单 */
        .fab {
            display: none; position: fixed; right: 25px; bottom: 30px;
            width: 60px; height: 60px; background: var(--primary);
            color: white; border-radius: 50%; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(255,133,162,0.4); z-index: 1001; font-size: 24px; border: none;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .novel-wrap { height: 75vh; }
            .side {
                position: fixed; bottom: -80vh; left: 0; width: 100%; height: 70vh;
                z-index: 2000; background: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 30px 30px 0 0; padding-top: 30px;
            }
            .side.open { bottom: 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
            .fab { display: flex; }
            .overlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.3);
                display: none; z-index: 1999; backdrop-filter: blur(4px);
            }
            .overlay.active { display: block; }
        }

        .novel-content p { margin-bottom: 18px; text-indent: 2em; line-height: 1.8; color: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="lock">
        <div class="lock-card">
            <h2 style="color: var(--accent)">💫 验证信号</h2>
            <input type="password" id="pw" class="in" placeholder="输入专属暗号">
            <button class="btn" onclick="unlock()">降落星球</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <h1 class="title">我们异地恋的小星球🪐</h1>
        </div>

        <div class="card-cd">
            <p style="color: #999; font-size: 0.9rem;">距离下次拥抱还有</p>
            <div id="cd" class="time">计算中...</div>
        </div>

        <div class="tabs">
            <button class="t-btn active" onclick="tab('diary', this)">情侣日记</button>
            <button class="t-btn" onclick="tab('novel', this)">香香的小说</button>
        </div>

        <div id="diary" class="box active"></div>

        <div id="novel" class="box">
            <div class="novel-wrap">
                <div class="overlay" id="mask" onclick="menu()"></div>
                <div class="side" id="side">
                    <h3 style="margin: 0 0 15px 10px; color: var(--accent);">章节目录</h3>
                    <div id="clist"></div>
                </div>
                <div class="reader" id="reader">
                    <h2 id="ctitle" style="margin-bottom: 25px; color: var(--accent);"></h2>
                    <div id="ctext" class="novel-content"></div>
                </div>
            </div>
            <button class="fab" onclick="menu()">📋</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 💎 这里是你唯一需要修改的数据区
        // ==========================================
        const DB = {
            pw: "821718",             // 1. 进入密码
            date: "2026/05/22",     // 2. 见面日期 (年/月/日)

            // 3. 小说列表：["标题", "内容"]
            // 提示：内容里可以直接按回车换行，不需要加任何代码
            novels: [
                ["第一章：重回高中", `　　“你也听说唱吗？”
　　看着眼前两个女生惊喜的目光，余安一阵恍惚。
　　“呃…听的！”他下意识回答。
　　“那你平时……”左边女生话才出口，两人像被按了开关，齐刷刷转回身去。
　　几乎是同时，一道冷冰冰的目光从前排扫过来。余安顺着看去，讲台上不知何时多了个表情严厉的女老师，她没点名，但那眼神足以让整个后排的温度降三度。
　　突如其来的安静让余安得以思考现状。
　　“我这是……穿越了？”他心想。明明前一秒还在和远隔千里的女友通电话，下一秒，就坐进了这间教室里。
　　这种剥离感让他狠狠掐了下大腿。
　　“嘶～！不是做梦？”
　　短暂的惊讶过后，余安心里那点不安迅速被巨大的兴奋吞没。穿越啊！这可是多少网文读者梦寐以求的事！以前没体验过的，现在不都能……
　　想到这里，他没能憋住，嘴角一咧，漏出一声傻笑：“诶嘿！✧(≖◡≖✿)”
　　笑声虽轻，在安静的教室里却格外清晰。周围几个同学好奇地看过来，前面两个女生也忍不住扭头，捂嘴偷笑。余安这才惊觉还在晚自习，连忙收敛表情。
　　可为时已晚，那道冰冷的目光再次锁定他，这次还带着更重的压迫感。
　　“余安！下课到办公室来！”
　　要是上辈子，余安肯定腿都软了。但此刻的他，内心毫无波澜，甚至还有点想笑——老师，您可能不知道，您面前的这个学生，可没那么简单(¬‿¬)️。
　　就在两个女生交换眼神，庆幸“还好没点我们”时，老师的声音再次响起，像一盆冷水浇下：
　　“杨妍和浅念！你们俩也一起来！”
　　如果说有什么比被抓住更难受的，那一定是刚准备幸灾乐祸，就被一网打尽。
　　下课铃响起，三人跟着老师走进办公室。
　　“来，说说吧，有什么事情这么聊不够？”老师慢条斯理地拆开一袋茶叶，倒进杯子，注入热水，全程没看他们一眼，声音却自带威压，“不说是吧？那一个个来。余安，你先说。”
　　“老师，我们真没聊天。”余安站得笔直，脸上还挂着人畜无害的笑容，“我就是跟她们借了个笔。”
　　“借笔？”老师手上动作一顿，终于抬起眼皮看他，“借笔能笑成那样？”
　　“老师，我……”余安一脸真诚，“我天生爱笑。”
　　“噗——”
　　身后传来两道没憋住的气声。杨妍和浅念死死捂住嘴，肩膀却控制不住地抖。
　　老师的嘴角也隐约抽了一下，不知是被气笑了还是真觉得好笑。她端起茶杯抿了一口，摆摆手：“行了，这次就算了，我相信你是借东西。下次再让我抓到，你们自己挑个人，坐讲台边上来。”
　　三人如获大赦，拼命点头。
　　“走吧，把门带上。”
　　一出门，杨妍就狠狠瞪了余安一眼：“都怪你！‘天生爱笑’，你怎么想的！”
　　余安耸耸肩，望着走廊外的夜空，笑得意味深长：“你不懂，这叫……新生。”
　　二人看着突然中二起来的余安，只觉莫名其妙，没多搭理他，继续回到了自己的位置上。
　　余安不着急回教室，而是面对着夜空，布局起了自己的重生大业。
　　“假如让你回到过去你最想干什么？”
　　余安突然想起之前女友给他的一个问题。
　　余安给出的回答是：“想早点和你在一起！”
　　余安转头，透过窗户望着正在和杨妍说笑的浅念。
　　“那我就先来找你了哦~(¯▽¯~)！”`],

                ["第二章：还没准备好哦", `我已经加速写啦`],

                ["第三章：未完待续", `我在加油！`]
            ],

            // 4. 日记列表：["日期", "标题", "内容"]
            diaries: [
                ["2026.03.05", "日记板块", "这个板块暂时用不了啦！我会加油升级的！"],
                ["2026.03.04", "我们的小网站", "今天我们的专属小网站正式上线啦！希望宝宝会喜欢！"]
            ]
        };
        // ==========================================

        function unlock() {
            if(document.getElementById('pw').value === DB.pw) {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                start();
            } else { alert("暗号不对哦～❤️"); }
        }

        function start() {
            // 倒计时逻辑
            setInterval(() => {
                const diff = new Date(DB.date) - new Date();
                const d = Math.floor(diff/864e5), h = Math.floor(diff%864e5/36e5), m = Math.floor(diff%36e5/6e4), s = Math.floor(diff%6e4/1e3);
                document.getElementById('cd').innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
            }, 1000);

            // 渲染日记
            document.getElementById('diary').innerHTML = DB.diaries.map(d => `
                <div class="diary-card">
                    <p style="color:var(--primary); font-weight:bold; font-size:0.8rem;">${d[0]}</p>
                    <h3 style="margin:5px 0 10px;">${d[1]}</h3>
                    <div style="color:#666;">${fmt(d[2])}</div>
                </div>
            `).join('');

            // 渲染小说目录
            const clist = document.getElementById('clist');
            DB.novels.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'ch-card';
                div.innerText = n[0];
                div.onclick = () => {
                    document.getElementById('ctitle').innerText = n[0];
                    document.getElementById('ctext').innerHTML = fmt(n[1]);
                    document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('active'));
                    div.classList.add('active');
                    document.getElementById('reader').scrollTop = 0;
                    if(window.innerWidth <= 768) menu(); 
                };
                clist.appendChild(div);
            });
            if(clist.firstChild) clist.firstChild.click();
        }

        // 自动换行工具
        function fmt(t) {
            return t.split('\n').filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join('');
        }

        function tab(id, b) {
            document.querySelectorAll('.box, .t-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            b.classList.add('active');
        }

        function menu() {
            document.getElementById('side').classList.toggle('open');
            document.getElementById('mask').classList.toggle('active');
        }
    </script>
</body>
</html>
