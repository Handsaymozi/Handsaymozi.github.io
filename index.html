<!DOCTYPE html>
<meta charset="utf-8">
<title>我们的小世界</title>
<style>
body{max-width:800px;margin:40px auto;line-height:1.6;font-size:18px;padding:0 10px}
h1,h2{color:#d63384}
.novel{margin:20px 0;padding:10px;border-left:3px solid #d63384}
</style>

<body>
<h1>❤️ 我们的日记</h1>
<div id="diary"></div>

<h1>📖 我们的小说</h1>
<div id="novel"></div>

<script>
fetch('data.json')
  .then(r=>r.json())
  .then(data=>{
    document.getElementById('diary').innerText = data.diary || '暂无日记'
    const novelEl = document.getElementById('novel')
    data.novels.forEach(n=>{
      const div = document.createElement('div')
      div.className = 'novel'
      div.innerHTML = `<h3>${n.title}</h3><p>${n.content}</p>`
      novelEl.appendChild(div)
    })
  })
</script>
</body>
