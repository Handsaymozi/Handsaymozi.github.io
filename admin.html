<!DOCTYPE html>
<meta charset="utf-8">
<title>管理页面</title>
<body>
<div id="login">
  密码：<input type=password id=pwd>
  <button onclick=login()>登录</button>
</div>

<div id=panel style="display:none">
  <h2>日记</h2>
  <textarea id="diary" style="width:100%;height:120px"></textarea>

  <h2>小说章节</h2>
  章节名：<input id=ntitle style="width:100%"><br>
  内容：<textarea id=ncontent style="width:100%;height:120px"></textarea>

  <br><br>
  <button onclick="saveDiary()">💾 保存日记</button>
  <button onclick="addNovel()">📖 添加小说章节</button>
  <button onclick="saveAll()">🚀 上传到网站</button>
</div>

<script>
const PASSWORD = "123456"
let data = { diary:"", novels:[] }

function login(){
  if(document.getElementById('pwd').value == PASSWORD){
    document.getElementById('login').style.display='none'
    document.getElementById('panel').style.display='block'
    load()
  }else{
    alert('密码错误')
  }
}

function load(){
  fetch('data.json').then(r=>r.json()).then(d=>{
    data = d
    document.getElementById('diary').value = data.diary
  })
}

function saveDiary(){
  data.diary = document.getElementById('diary').value
  alert('日记已暂存')
}

function addNovel(){
  const t = document.getElementById('ntitle').value
  const c = document.getElementById('ncontent').value
  if(!t||!c)return alert('请填章节名和内容')
  data.novels.push({title:t, content:c})
  document.getElementById('ntitle').value=''
  document.getElementById('ncontent').value=''
  alert('章节已添加')
}

function saveAll(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'})
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'data.json'
  a.click()
  alert('下载完成！请把 data.json 传到 GitHub 即可更新网站！')
}
</script>
</body>
